version: '3.8'

services:
  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodlepassword
    volumes:
      - db_data:/var/lib/mysql
    # Paramètres requis par Moodle
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  moodle:
    image: moodlehq/moodle-php-apache:8.1
    ports:
      - "8080:80"
    environment:
      MOODLE_DOCKER_DBTYPE: mariadb
      MOODLE_DOCKER_DBNAME: moodle
      MOODLE_DOCKER_DBUSER: moodle
      MOODLE_DOCKER_DBPASS: moodlepassword
      MOODLE_DOCKER_DBHOST: db
      MOODLE_DOCKER_WWWROOT: /var/www/html
    volumes:
      # Le code source de Moodle (téléchargé à l'étape suivante)
      - ./moodle:/var/www/html
      # Dossier moodledata (fichiers uploadés, cache...)
      - ./moodledata:/var/moodledata
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
    depends_on:
      - db

volumes:
  db_data: