services:
  mariadb:
    env_file:
      - .env
    image: mariadb:11
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped

  moodle:
    build:
      context: .
      dockerfile: Dockerfile.moodle
    depends_on:
      - mariadb
    env_file:
      - .env
    volumes:
      - moodle_data:/var/www/moodledata
      - ./moodle:/var/www/html:delegated
      - ./plugin/block:/var/www/html/public/blocks/owl
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
    ports:
      - "8089:80"
    restart: unless-stopped

volumes:
  mariadb_data:
  moodle_data: